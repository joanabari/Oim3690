<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Score Analyzer</title>
  <style>
    .bar {
      height: 20px;
      margin: 5px 0;
      color: white;
      padding-left: 5px;
    }

    .green { background-color: green; }
    .orange { background-color: orange; }
    .red { background-color: red; }
  </style>
</head>
<body>

<h1>Score Analyzer</h1>

<div id="stats"></div>

<h3>Score Bars</h3>
<div id="bars"></div>

<h3>Grade Distribution</h3>
<div id="distribution"></div>

<input id="scoreInput" type="number" placeholder="Enter score" />
<button id="addBtn">Add Score</button>

<script>
  const scores = [88, 72, 95, 63, 81, 56, 90];

  const statsDiv = document.getElementById('stats');
  const barsDiv = document.getElementById('bars');
  const distDiv = document.getElementById('distribution');
  const input = document.getElementById('scoreInput');
  const button = document.getElementById('addBtn');

  function getGrade(score) {
    if (score >= 90) return 'A';
    if (score >= 80) return 'B';
    if (score >= 70) return 'C';
    if (score >= 60) return 'D';
    return 'F';
  }

  function getColor(grade) {
    if (grade === 'A' || grade === 'B') return 'green';
    if (grade === 'C' || grade === 'D') return 'orange';
    return 'red';
  }

  function render() {
    let total = 0;
    let highest = scores[0];
    let lowest = scores[0];
    let passing = 0;

    let gradeCount = { A: 0, B: 0, C: 0, D: 0, F: 0 };

    // LOOP through scores
    for (let i = 0; i < scores.length; i++) {
      const score = scores[i];

      total += score;

      if (score > highest) highest = score;
      if (score < lowest) lowest = score;

      if (score >= 60) passing++;

      const grade = getGrade(score);
      gradeCount[grade]++;
    }

    const avg = (total / scores.length).toFixed(1);

    // PART 1: Stats
    statsDiv.innerHTML = `
      <p>Total scores: ${scores.length}</p>
      <p>Average: ${avg}</p>
      <p>Highest: ${highest}</p>
      <p>Lowest: ${lowest}</p>
      <p>Passing (>=60): ${passing}</p>
    `;

    // PART 2: Bars
    barsDiv.innerHTML = '';

    for (let i = 0; i < scores.length; i++) {
      const score = scores[i];
      const grade = getGrade(score);
      const colorClass = getColor(grade);

      const bar = document.createElement('div');
      bar.className = `bar ${colorClass}`;
      bar.style.width = score + '%';
      bar.textContent = `${score} (${grade})`;

      barsDiv.appendChild(bar);
    }

    // PART 3: Grade distribution
    distDiv.innerHTML = '';

    for (let grade in gradeCount) {
      const count = gradeCount[grade];

      const bar = document.createElement('div');
      bar.className = 'bar';
      bar.style.width = (count * 20) + 'px'; // scale for visibility
      bar.style.backgroundColor = 'gray';
      bar.textContent = `${grade}: ${count}`;

      distDiv.appendChild(bar);
    }
  }

  // PART 4: Add new scores
  button.addEventListener('click', () => {
    const value = Number(input.value);

    if (!isNaN(value) && value >= 0 && value <= 100) {
      scores.push(value);
      input.value = '';
      render();
    }
  });

  render();
</script>

</body>
</html>
