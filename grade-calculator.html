<!DOCTYPE html>
<html>
<head>
  <title>Grade Calculator</title>
</head>
<body>

  <h2>Grade Calculator</h2>

  <input id="scoreInput" type="text" placeholder="Enter score">
  <button onclick="calculateGrade()">Get Grade</button>

  <p id="result"></p>

  <script>
    function getGrade(score) {
      if (score >= 90) {
        return "A";
      } else if (score >= 80) {
        return "B";
      } else if (score >= 70) {
        return "C";
      } else if (score >= 60) {
        return "D";
      } else {
        return "F";
      }
    }

    function calculateGrade() {
      let input = document.getElementById("scoreInput").value;

      // Convert string → number
      let score = Number(input);

      let grade = getGrade(score);

      document.getElementById("result").textContent = "Grade: " + grade;
    }
  </script>

</body>
</html>
