<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
</head>
<body>
    <input type="number" id="x" />
    <input type="number" id="y" />
    <button>Calculate</button>

    <p id="result"></p>

<script>
        const firstName = document.getElementById("first-name");
        const lastName = document.getElementById("last-name");
        const x = document.getElementById("x");
        const y = document.getElementById("y");
        const button = document.querySelector("button");
        const result = document.getElementById("result");

        // function to add values
        function add(a, b) {
            return a + b;
        }

        button.addEventListener("click", () => {
            let firstNameInput, lastNameInput, xInput, yInput;

            firstNameInput = firstName.value;
            lastNameInput = lastName.value;
            xInput = parseFloat(x.value);
            yInput = parseFloat(y.value);

            const fullName = add(firstNameInput, lastNameInput);
            const sum = add(xInput, yInput);

            result.textContent = `${fullName}, sum is: ${sum}`;
        });
    </script>
</body>
</html>
