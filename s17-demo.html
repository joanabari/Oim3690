<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
</head>
<body>
    <script>
        //Strings:
        const firstName = "Michael";
        const lastName = 'Scott';
        const name = `${firstName} ${lastName}`;
        const message = `Hello, ${name}! Welcome to JavaScript!`;
        console.log(message);

        //Numbers:
        let age = 45;
        age = age + 5; // This will cause an error because age is a constant
        console.log('In 5 years, you will be ' + age + ' years old.');

        // Boolean
        let isEmployed = true;
        console.log(`Is ${name} employed? ${isEmployed}`);

        if (isEmployed) {
        console.log(`${name} is working at Dunder Mifflin.`);
        } else {
        console.log(`${name} is currently unemployed.`);
        }

        // undefined and null
        let officeLocation; // This variable is undefined
        console.log(`Office location: ${officeLocation}`);

        let manager = null; // This variable is null
        console.log(`Manager of Dunder Mifflin is ${manager}.`);
        
    </script>
</body>
</html>
