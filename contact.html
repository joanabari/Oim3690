<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        margin: 0;
        padding: 24px;
        background: #f6f7fb;
      }
      .container {
        max-width: 720px;
        margin: 0 auto;
        background: white;
        padding: 24px;
        border-radius: 12px;
        border: 1px solid #e6e6e6;
      }
      h1 {
        margin-top: 0;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .row {
        display: flex;
        gap: 12px;
      }

      .field {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      label {
        font-weight: 600;
      }

      input,
      textarea {
        padding: 10px 12px;
        border: 1px solid #cfcfcf;
        border-radius: 10px;
        font-size: 16px;
      }

      textarea {
        resize: vertical;
        min-height: 120px;
      }

      button {
        padding: 12px 14px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        background: #1f4b99;
        color: white;
      }

      button:hover {
        opacity: 0.92;
      }

      @media (max-width: 600px) {
        .row {
          flex-direction: column;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Contact Me</h1>
      <p>Fill out the form below and hit submit.</p>

      <form action="#" method="post">
        <div class="row">
          <div class="field">
            <label for="name">Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Enter your name"
              required
            />
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="email@example.com"
              required
            />
          </div>
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea
            id="message"
            name="message"
            placeholder="Enter your message"
            required
          ></textarea>
        </div>

        <button type="submit">Submit</button>
      </form>
    </div>
  </body>
</html>
