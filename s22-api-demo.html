<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Town Search</title>
</head>
<body>

    <input type="text" id="search" placeholder="Search towns..." />
    <button>Search</button>

    <div id="result"></div>

    <!-- Load token FIRST -->
    <script src="js/config.js"></script>

    <script>
        const btn = document.querySelector("button");
        const searchInput = document.querySelector("#search");
        const result = document.querySelector("#result");

        async function findTown() {
            const search = searchInput.value.toLowerCase();

            const response = await fetch("https://oim.108122.xyz/mass", {
                headers: {
                    "X-Token": OIM_TOKEN,
                },
            });

            const data = await response.json();

            const matches = [];

            for (const town of data.data) {
                if (town.name.toLowerCase().includes(search)) {
                    matches.push(town);
                }
            }

            // Clear previous results
            result.innerHTML = "";

            if (matches.length === 0) {
                result.innerHTML = "<p>No matches found.</p>";
            } else {
                for (const match of matches) {
                    result.innerHTML += `<p>${match.name}: pop ${match.population}</p>`;
                }
            }
        }

        // Live search (as you type)
        searchInput.addEventListener("input", () => {
            findTown();
        });

        // Button click
        btn.addEventListener("click", () => {
            findTown();
        });
    </script>

</body>
</html>
